<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anima Bella | Centro Estetico & Nail Salone</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* 奢华极简色调 */
        :root {
            --primary: #bc8e56; 
            --primary-hover: #a37644;
            --text-dark: #222222;
            --text-light: #777777;
            --bg-light: #faf9f6; 
            --white: #ffffff;
            --whatsapp-green: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; letter-spacing: 0.5px; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--white); color: var(--text-dark); line-height: 1.7; }
        img { max-width: 100%; display: block; }

        /* 导航栏 */
        header { position: sticky; top: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); z-index: 1000; padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f2f0eb; }
        .logo img { height: 75px; width: auto; object-fit: contain; }
        .nav-links { display: flex; gap: 40px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--text-dark); font-weight: 400; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; transition: color 0.3s; }
        .nav-links a:hover { color: var(--primary); }

        /* 主按钮 (WhatsApp) */
        .btn-main { background-color: var(--text-dark); color: var(--white); padding: 12px 28px; text-decoration: none; font-weight: 500; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; transition: all 0.3s ease; }
        .btn-main:hover { background-color: var(--whatsapp-green); transform: translateY(-1px); }

        /* 次要按钮 (Treatwell) */
        .btn-secondary { background-color: transparent; color: var(--text-dark); border: 1px solid var(--text-dark); padding: 12px 28px; text-decoration: none; font-weight: 500; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; transition: all 0.3s ease; }
        .btn-secondary:hover { background-color: var(--text-dark); color: white; transform: translateY(-1px); }

        /* Hero 区 */
        .hero { display: flex; align-items: center; background-color: var(--bg-light); padding: 0 0 0 8%; min-height: 70vh; }
        .hero-text { flex: 1; padding-right: 60px; }
        .hero-text h1 { font-size: 2.8rem; font-weight: 200; margin-bottom: 25px; text-transform: uppercase; }
        .hero-buttons { display: flex; gap: 15px; margin-top: 30px; }
        .hero-img { flex: 1.2; height: 70vh; background-image: url('https://images.pexels.com/photos/704815/pexels-photo-704815.jpeg?auto=compress&cs=tinysrgb&w=1600'); background-size: cover; background-position: center; }

        /* 联络区按钮样式 */
        .contact-btns { margin-top: 35px; display: flex; flex-direction: column; gap: 15px; }
        .booking-btn-main { display: block; text-align: center; background-color: var(--text-dark); color: white; padding: 16px; text-decoration: none; font-weight: 500; font-size: 0.85rem; text-transform: uppercase; transition: 0.3s; }
        .booking-btn-main:hover { background-color: var(--whatsapp-green); }
        .booking-btn-secondary { display: block; text-align: center; background-color: transparent; color: var(--text-dark); border: 1px solid var(--text-dark); padding: 16px; text-decoration: none; font-weight: 500; font-size: 0.85rem; text-transform: uppercase; transition: 0.3s; }
        .booking-btn-secondary:hover { background-color: var(--text-dark); color: white; }

        /* 其他布局样式 (保持原有) */
        section { padding: 100px 8%; }
        .section-title { font-size: 1.8rem; font-weight: 300; text-transform: uppercase; margin-bottom: 50px; text-align: center; }
        
        /* 移动端优化 */
        @media (max-width: 900px) {
            .hero { flex-direction: column; padding: 60px 5%; text-align: center; }
            .hero-buttons { justify-content: center; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><img src="https://i.ibb.co/zWSSgh7h/1-15.png" alt="Anima Bella Logo"></div>
        <ul class="nav-links">
            <li><a href="#chi-siamo">Chi Siamo</a></li>
            <li><a href="#servizi">Servizi</a></li>
            <li><a href="#contatti">Dove Siamo</a></li>
        </ul>
        <a href="https://wa.me/393242652619?text=Ciao!%20Vorrei%20prenotare." class="btn-main">WhatsApp</a>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h1>Anima Bella<br>Il Tuo Momento di Relax</h1>
            <p>Nail Art e Trattamenti Estetici Professionali a San Giuliano Milanese.</p>
            <div class="hero-buttons">
                <a href="https://wa.me/393242652619?text=Ciao!%20Vorrei%20prenotare." class="btn-main">WhatsApp</a>
                <a href="https://www.treatwell.it/salone/anima-bella-centro-estetico/" target="_blank" class="btn-secondary">Treatwell</a>
            </div>
        </div>
        <div class="hero-img"></div>
    </section>

    <section id="contatti" class="contact">
        <div class="contact-info">
            <h2 class="section-title">Dove Siamo</h2>
            <div class="contact-btns">
                <a href="https://wa.me/393242652619?text=Ciao!%20Vorrei%20prenotare." class="booking-btn-main">Prenota su WhatsApp</a>
                <a href="https://www.treatwell.it/salone/anima-bella-centro-estetico/" target="_blank" class="booking-btn-secondary">Prenota su Treatwell</a>
            </div>
        </div>
    </section>

</body>
</html>
